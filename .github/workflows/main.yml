name: Build React Native Android and iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # -------------------------
  # iOS Build
  # -------------------------
  build-ios:
   runs-on: macos-latest

   steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # Step 1: Enable Corepack and Yarn 3.6.4
    - name: Enable Corepack and Yarn 3.6.4
      run: |
        corepack enable
        corepack prepare yarn@3.6.4 --activate
    
    # Step 2: Force Yarn to use node_modules
    - name: Configure Yarn linker
      run: yarn config set nodeLinker node-modules
    
    # Step 3: Install project dependencies
    - name: Install dependencies
      run: yarn install --immutable

    # Install dependencies and pods
    - name: Install dependencies & Pods
      run: |
        yarn install --immutable
        cd ios
        yarn pod-install
        
    # 🧹 Step 4: Clean up caches (Pods, DerivedData, build, node_modules)
    - name: Clean up everything
      run: |
          echo "🧹 Cleaning old builds, caches, and pods..."
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ios/build
          rm -rf ios/Pods
          rm -rf node_modules
          npm install
          cd ios && pod deintegrate && pod install --repo-update && cd ..

      # ⚙️ Step 5: Ensure Hermes scripts are executable
    - name: Fix Hermes script permissions
      run: |
          echo "🧩 Ensuring all Hermes-related scripts are executable"
          find ios/Pods -type f -name "Script-*.sh" -exec chmod +x {} \;

    - name: Build iOS App (Unsigned)
      run: |
          cd ios

          # 🧩 Create a minimal ExportOptions.plist
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string></string>
          </dict>
          </plist>
          EOF

          # 🏗️ Build and archive
          xcodebuild \
            -workspace RN74Example.xcworkspace \
            -scheme RN74Example \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/RN74Example.xcarchive \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_IDENTITY="" \
            archive | tee xcodebuild.log | xcpretty || cat xcodebuild.log

          # 📦 Export unsigned IPA
          xcodebuild -exportArchive \
            -archivePath $PWD/build/RN74Example.xcarchive \
            -exportPath $PWD/build/ \
            -exportOptionsPlist ExportOptions.plist

    # Upload IPA
    - name: Upload iOS IPA
      uses: actions/upload-artifact@v4
      with:
        name: app-release-ios
        path: ios/build/*.ipa
