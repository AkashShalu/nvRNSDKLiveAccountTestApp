name: Build React Native Android and iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # -------------------------
  # iOS Build
  # -------------------------
  build-ios:
   runs-on: macos-latest

   steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # Step 1: Enable Corepack and Yarn 3.6.4
    - name: Enable Corepack and Yarn 3.6.4
      run: |
        corepack enable
        corepack prepare yarn@3.6.4 --activate
    
    # Step 2: Force Yarn to use node_modules
    - name: Configure Yarn linker
      run: yarn config set nodeLinker node-modules
    
    # Step 3: Install project dependencies
    - name: Install dependencies
      run: yarn install --immutable

    # Install dependencies and pods
    - name: Install dependencies & Pods
      run: |
        yarn install --immutable
        cd ios
        yarn pod-install

    # Build unsigned IPA
    - name: Build iOS App (Unsigned)
      run: |
        cd ios
        xcodebuild \
          -workspace RN74Example.xcworkspace \
          -scheme RN74Example \
          -configuration Release \
          -sdk iphoneos \
          -archivePath $PWD/build/RN74Example.xcarchive \
           CODE_SIGNING_ALLOWED=NO \
           archive | tee xcodebuild.log | xcpretty || cat xcodebuild.log

        xcodebuild -exportArchive \
          -archivePath $PWD/build/RN74Example.xcarchive \
          -exportPath $PWD/build/ \
          -exportOptionsPlist ExportOptions.plist

    # Upload IPA
    - name: Upload iOS IPA
      uses: actions/upload-artifact@v4
      with:
        name: app-release-ios
        path: ios/build/*.ipa
